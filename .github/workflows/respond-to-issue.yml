name: Respond to Issue
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write

jobs:
  respond:
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.issue.title, '[skip]') &&
      contains(join(github.event.issue.labels.*.name, ','), 'ask-agent')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Comment and close issue via AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/respond-to-issue.js

      - name: Update Office Visual State
        env:
          ACTION_TYPE: query_resolved
          AGENT_ID: ${{ env.RESOLVED_AGENT_ID }}
          QUERY_SUMMARY: ${{ env.ISSUE_TITLE_SHORT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-office-state.js
