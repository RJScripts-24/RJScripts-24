<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 600" width="900" height="600">
  <style>
    <![CDATA[
      @media (prefers-reduced-motion: no-preference) {
        .float { animation: float 2s linear infinite; }
        .pulse-screen { animation: pulse-screen 1.5s linear infinite; }
        .master-ring { transform-origin: 450px 280px; animation: golden-spin 8s linear infinite; }
        .marquee-text { animation: ticker-scroll 20s linear infinite; }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      @keyframes pulse-screen {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1.0; }
      }
      @keyframes golden-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes ticker-scroll {
        0% { transform: translateX(900px); }
        100% { transform: translateX(-100%); }
      }

      .text-title { font-family: monospace; font-size: 24px; fill: #ffffff; text-anchor: middle; font-weight: bold; }
      .text-ticker { font-family: monospace; font-size: 16px; fill: #00ff00; }
      .text-label { font-family: monospace; font-size: 12px; fill: #ffffff; text-anchor: middle; }
    ]]>
  </style>

  <rect width="900" height="600" fill="#0d1117" />
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="1"/>
  </pattern>
  <rect width="900" height="600" fill="url(#grid)" />
  <text x="450" y="40" class="text-title">NEURAL OFFICE</text>

  <!-- Master Agent -->
  <a xlink:href="https://github.com/rkj24/RJScripts-24/issues/new?labels=ask-master&amp;template=query_template.md&amp;title=Query+for+Master+Agent%3A+" target="_blank">
    <g transform="translate(380, 250)">
      <circle cx="70" cy="30" r="80" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="10 5" class="master-ring" />
      <rect x="20" y="40" width="100" height="40" fill="#2d333b" rx="2" />
      <rect x="40" y="10" width="60" height="30" fill="#1c2128" rx="2" />
      <rect x="45" y="15" width="50" height="20" fill="#FFD700" class="pulse-screen" style="animation-delay: 0s;" rx="1" />
      <g class="float">
        <rect x="66" y="-14" width="8" height="10" fill="#FFD700" />
        <rect x="66" y="-22" width="8" height="8" fill="#FFF099" />
        <rect x="68" y="-20" width="2" height="2" fill="#000" />
        <rect x="72" y="-20" width="2" height="2" fill="#000" />
        <rect x="69" y="-26" width="2" height="4" fill="#FFD700" />
      </g>
      <text x="70" y="100" class="text-label">Master Agent</text>
    </g>
  </a>

  <!-- Frontend Agent -->
  <a xlink:href="https://github.com/rkj24/RJScripts-24/issues/new?labels=ask-frontend&amp;template=query_template.md&amp;title=Query+for+Frontend+Agent%3A+" target="_blank">
    <g transform="translate(100, 100)">
      <rect x="20" y="40" width="80" height="35" fill="#2d333b" rx="2" />
      <rect x="35" y="15" width="50" height="25" fill="#1c2128" rx="2" />
      <rect x="40" y="20" width="40" height="15" fill="#61DAFB" class="pulse-screen" style="animation-delay: 0.3s;" rx="1" />
      <g class="float">
        <rect x="56" y="0" width="8" height="10" fill="#61DAFB" />
        <rect x="56" y="-8" width="8" height="8" fill="#A0E9FF" />
        <rect x="58" y="-6" width="2" height="2" fill="#000" />
        <rect x="62" y="-6" width="2" height="2" fill="#000" />
      </g>
      <text x="60" y="95" class="text-label">Frontend Agent</text>
    </g>
  </a>

  <!-- Backend Agent -->
  <a xlink:href="https://github.com/rkj24/RJScripts-24/issues/new?labels=ask-backend&amp;template=query_template.md&amp;title=Query+for+Backend+Agent%3A+" target="_blank">
    <g transform="translate(660, 100)">
      <rect x="20" y="40" width="80" height="35" fill="#2d333b" rx="2" />
      <rect x="35" y="15" width="50" height="25" fill="#1c2128" rx="2" />
      <rect x="40" y="20" width="40" height="15" fill="#68D391" class="pulse-screen" style="animation-delay: 0.6s;" rx="1" />
      <g class="float">
        <rect x="56" y="0" width="8" height="10" fill="#68D391" />
        <rect x="56" y="-8" width="8" height="8" fill="#A8E8C0" />
        <rect x="58" y="-6" width="2" height="2" fill="#000" />
        <rect x="62" y="-6" width="2" height="2" fill="#000" />
      </g>
      <text x="60" y="95" class="text-label">Backend Agent</text>
    </g>
  </a>

  <!-- Database Agent -->
  <a xlink:href="https://github.com/rkj24/RJScripts-24/issues/new?labels=ask-database&amp;template=query_template.md&amp;title=Query+for+Database+Agent%3A+" target="_blank">
    <g transform="translate(100, 400)">
      <rect x="20" y="40" width="80" height="35" fill="#2d333b" rx="2" />
      <rect x="35" y="15" width="50" height="25" fill="#1c2128" rx="2" />
      <rect x="40" y="20" width="40" height="15" fill="#B794F4" class="pulse-screen" style="animation-delay: 0.9s;" rx="1" />
      <g class="float">
        <rect x="56" y="0" width="8" height="10" fill="#B794F4" />
        <rect x="56" y="-8" width="8" height="8" fill="#D6C1F9" />
        <rect x="58" y="-6" width="2" height="2" fill="#000" />
        <rect x="62" y="-6" width="2" height="2" fill="#000" />
      </g>
      <text x="60" y="95" class="text-label">Database Agent</text>
    </g>
  </a>

  <!-- DevOps Agent -->
  <a xlink:href="https://github.com/rkj24/RJScripts-24/issues/new?labels=ask-devops&amp;template=query_template.md&amp;title=Query+for+DevOps+Agent%3A+" target="_blank">
    <g transform="translate(660, 400)">
      <rect x="20" y="40" width="80" height="35" fill="#2d333b" rx="2" />
      <rect x="35" y="15" width="50" height="25" fill="#1c2128" rx="2" />
      <rect x="40" y="20" width="40" height="15" fill="#F6AD55" class="pulse-screen" style="animation-delay: 1.2s;" rx="1" />
      <g class="float">
        <rect x="56" y="0" width="8" height="10" fill="#F6AD55" />
        <rect x="56" y="-8" width="8" height="8" fill="#FBD38D" />
        <rect x="58" y="-6" width="2" height="2" fill="#000" />
        <rect x="62" y="-6" width="2" height="2" fill="#000" />
      </g>
      <text x="60" y="95" class="text-label">DevOps Agent</text>
    </g>
  </a>

  <!-- Ticker Bar -->
  <rect x="0" y="560" width="900" height="40" fill="#161b22" />
  <svg x="0" y="560" width="900" height="40">
    <text x="0" y="25" class="text-ticker marquee-text">🤖 AI Agents Online | Ask me anything via the agent desks above</text>
  </svg>
</svg>
